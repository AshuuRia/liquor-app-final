name = "liquor-inventory"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist/public"

# ── Public runtime variables ──────────────────────────────────────────────────
# Paste your Clerk publishable key (pk_live_...) here.
[vars]
CLERK_PUBLISHABLE_KEY = "pk_test_bW92aW5nLXdlYXNlbC03My5jbGVyay5hY2NvdW50cy5kZXYk"

# ── Cloudflare D1 database binding ───────────────────────────────────────────
# After running `npx wrangler d1 create liquor-inventory-db`, paste the
# database_id output below.
[[d1_databases]]
binding = "DB"
database_name = "liquor-inventory-db"
database_id = "060af7ad-0e5a-4f29-8b81-2c13462c9ca0"
